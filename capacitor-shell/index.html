<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouMine Mobile Shell</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(14, 165, 233, 0.18), transparent 28%),
          linear-gradient(180deg, #020617, #0f172a);
      }

      main {
        width: min(92vw, 32rem);
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 30px 100px -50px rgba(14, 165, 233, 0.65);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      p {
        margin: 0.9rem 0 0;
        line-height: 1.6;
        color: #cbd5e1;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>YouMine mobile shell</h1>
      <p>
        Capacitor is configured and ready to sync native assets without changing the Next.js web build.
      </p>
      <p>
        To point native builds at a hosted web app, set <code>CAPACITOR_SERVER_URL</code>.
      </p>
    </main>
  </body>
</html>
