<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="YouMine App Icon">
  <defs>
    <linearGradient id="iconBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <radialGradient id="iconGlow" cx="24%" cy="18%" r="88%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="36%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="28" stdDeviation="42" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#iconBg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#iconGlow)"/>

  <g filter="url(#shadow)">
    <text
      x="50%"
      y="51%"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
      font-weight="800"
      font-size="420"
      letter-spacing="-24"
      fill="#071026"
    >
      YM
    </text>
  </g>
</svg>