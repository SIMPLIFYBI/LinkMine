<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 420" width="1800" height="420" role="img" aria-label="YouMine wordmark gradient">
  <defs>
    <linearGradient id="wordmarkGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <style>
      .wordmark {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 260px;
        font-weight: 800;
        letter-spacing: -0.05em;
      }
    </style>
  </defs>

  <rect width="1800" height="420" fill="none"/>
