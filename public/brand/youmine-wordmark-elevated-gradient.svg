<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 520" width="1900" height="520" role="img" aria-label="YouMine elevated wordmark gradient">
  <defs>
    <linearGradient id="elevatedFill" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="52%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="elevatedUnderline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="18%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#818cf8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#38bdf8" flood-opacity="0.2"/>
    </filter>
    <style>
      .wordmark {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 276px;
        font-weight: 900;
        letter-spacing: -0.055em;
      }
    </style>
  </defs>

  <rect width="1900" height="520" fill="none"/>
  <g filter="url(#softGlow)">
    <rect x="122" y="352" width="1340" height="18" rx="9" fill="url(#elevatedUnderline)"/>
  </g>
  <text x="120" y="308" class="wordmark" fill="url(#elevatedFill)">YouMine<tspan fill="#22d3ee">.</tspan></text>
</svg>